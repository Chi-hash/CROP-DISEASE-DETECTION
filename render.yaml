services:
  - type: web
    name: agriscan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: HF_MODEL_ID
        value: linkanjarad/mobilenet-v2-plant-disease-identification
      - key: PYTHON_VERSION
        value: "3.11"
